name: Missing Data
description: Suggest a missing geography record.
title: 'missing: '
labels:
  - missing-data
body:
  - type: dropdown
    id: record-type
    attributes:
      label: Record Type
      options:
        - governorate
        - district
        - subdistrict
        - city
        - town
        - village
        - locality
    validations:
      required: true
  - type: input
    id: name
    attributes:
      label: Name
      description: Name of the missing record.
    validations:
      required: true
  - type: textarea
    id: parent
    attributes:
      label: Parent Administrative Area
      description: Governorate, district, or subdistrict if known.
  - type: input
    id: coverage-target
    attributes:
      label: Coverage Report Target
      description: Optional area or record ID from dist/coverage/COVERAGE.md.
      placeholder: districts.population or sy-idlib-ariha
  - type: textarea
    id: sources
    attributes:
      label: Sources
      description: Add URLs or citations that support the missing record.
    validations:
      required: true
